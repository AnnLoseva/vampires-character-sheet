};

// Окрашивание иконки в фирменный красный цвет
async function tintImageToRed(imgUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = imgUrl;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                if (data[i + 3] === 0) continue; // пропускаем прозрачные пиксели
                data[i] = 255;     // Red
                data[i + 1] = Math.floor(data[i + 1] * 0.1); // Green → почти 0
                data[i + 2] = Math.floor(data[i + 2] * 0.1); // Blue → почти 0
            }

            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => resolve(null);
    });
}

// Кэш окрашенных иконок
const tintedCache = {};

// Получение окрашенной иконки
async function getTintedEmoji(url) {
    if (tintedCache[url]) return tintedCache[url];
    const tinted = await tintImageToRed(url);
    if (tinted) tintedCache[url] = tinted;
    return tinted;
}

// Обновление иконки клана
async function updateClanIcon() {
    const clanName = document.getElementById('clan-input').value;
    const container = document.getElementById('clan-icon-container');
    if (!container) return;

    if (!clanName) {
        container.innerHTML = '';
        return;
    }

    const tintedUrl = await getTintedEmoji(CLAN_ICONS[clanName]);
    if (tintedUrl) {
        container.innerHTML = `<img src="${tintedUrl}" class="clan-icon" alt="${clanName}">`;
    } else {
        container.innerHTML = `<span style="font-size:32px; color:#666;">🧛</span>`;
    }
}

// Рендер иконки (вспомогательная)
async function renderClanIcon(clanName) {
    const tintedUrl = await getTintedEmoji(CLAN_ICONS[clanName]);
    return tintedUrl 
        ? `<img src="${tintedUrl}" class="clan-icon" alt="${clanName}">` 
        : `<span style="font-size:32px; color:#ff3131;">❌</span>`;
}

// Добавление дисциплины в список
function addDiscipline(name = '', source = 'Вручную') {
    const list = document.getElementById('disciplines-list');
    if (!list) return;

    const unique = 'disc-' + Date.now() + Math.random().toString(36).substr(2, 5);

    const item = document.createElement('div');
    item.className = 'discipline-item';
    item.innerHTML = `
        <div style="flex:1; color:#ddd; font-size:15.5px;">${name}</div>
        
        <div class="dots-discipline" style="display:flex; gap:6px;">
            ${[1,2,3,4,5].map(level => `

                    <input type="radio" name="${unique}" value="${level}" style="display:none;">
                    <span style="width:24px; height:24px; border:2px solid #555; border-radius:50%; background:#1f1f1f; transition:all 0.2s;"></span>
                </label>
            `).join('')}
        </div>

        <small style="color:#777; min-width:75px; text-align:right;">${source}</small>
        
        <button onclick="this.parentElement.remove(); updateDisciplineTotal()" 
                style="background:#222; color:#ff6666; border:none; width:26px; height:26px; border-radius:50%; cursor:pointer;">×</button>
    `;

    list.appendChild(item);

    // Активация точек
    const inputs = item.querySelectorAll('input[type="radio"]');
    const spans = item.querySelectorAll('span');

    inputs.forEach(input => {
        input.addEventListener('change', () => {
            const selected = parseInt(input.value);
            spans.forEach((span, index) => {
                if (index + 1 <= selected) {
                    span.style.background = '#ff3131';
                    span.style.borderColor = '#ff6666';
                    span.style.boxShadow = '0 0 10px #ff3131';
                } else {
                    span.style.background = '#1f1f1f';
                    span.style.borderColor = '#555';
                    span.style.boxShadow = 'none';
                }
            });
            updateDisciplineTotal();
        });
    });

    updateDisciplineTotal();
}

    document.querySelectorAll('#disciplines-list input[type="radio"]:checked').forEach(r => {

    const counter = document.getElementById('discipline-total');
    if (counter) counter.textContent = `(${total}/5)`;

const ATTR_LIMITS = { 4: 1, 3: 3, 2: 4, 1: 1 };
const SKILL_PACKAGES = {
    specialist: { 4: 1, 3: 3, 2: 3, 1: 3 },
    balanced:   { 4: 0, 3: 3, 2: 5, 1: 7 },
    versatile:  { 4: 0, 3: 1, 2: 8, 1: 10 }
};

let counts = { attr: {4:0, 3:0, 2:0, 1:0}, skill: {4:0, 3:0, 2:0, 1:0} };

// Основная функция обновления трекеров
function updateTrackers() {
    const counts = { attr: {4:0,3:0,2:0,1:0}, skill: {4:0,3:0,2:0,1:0} };

    document.querySelectorAll('.dot-input:checked').forEach(input => {
        const val = parseInt(input.value);
        if (val > 0) counts[input.dataset.type][val]++;
    });

    // Вторичные
    const stamina = parseInt(document.querySelector('input[name="Выносливость"]:checked')?.value || 1);
    const composure = parseInt(document.querySelector('input[name="Самообладание"]:checked')?.value || 1);
    const resolve = parseInt(document.querySelector('input[name="Упорство"]:checked')?.value || 1);

    document.getElementById('val-hp').textContent = stamina + 3;
    document.getElementById('val-wp').textContent = composure + resolve;

    renderTracker('attr', ATTR_LIMITS, 'attr-tracker');
    renderTracker('skill', SKILL_PACKAGES[currentPackage], 'skill-tracker');

    let specCount = document.querySelectorAll('.spec-checkbox:checked').length;
    document.getElementById('spec-tracker').textContent = `Специализации (S): ${specCount} / 1`;

    checkLimits();
}

function renderTracker(type, limits, trackerId) {
    let html = `<b>${type === 'attr' ? 'Атрибуты' : 'Навыки'}:</b>`;
    for (let v of [1,2,3,4,5]) {
        const limit = limits[v] !== undefined ? limits[v] : 0;
        const count = counts[type][v] || 0;
        let status = (count > limit || (v === 5 && count > 0)) ? 'over-limit' : '';
        html += `<div class="tracker-item ${status}">На ${v}: ${count} / ${limit}</div>`;
    }
    document.getElementById(trackerId).innerHTML = html;
}

function checkLimits() {
    const guide = document.querySelector('.guide');
    const warning = document.getElementById('global-warning');
    const hasOver = document.querySelectorAll('.over-limit').length > 0;
    const hasFive = counts.attr[5] > 0 || counts.skill[5] > 0;

    if (hasOver || hasFive) {
        guide.classList.add('error');
        warning.style.display = 'block';
    } else {
        guide.classList.remove('error');
        warning.style.display = 'none';
    }
}

// Добавление новой строки специальности
function addSpecLine(skillName) {
    const container = document.getElementById('specs-' + skillName);
    if (!container) return;

    const line = document.createElement('div');
    line.className = 'skill-spec-line';
    line.innerHTML = `
        <input type="text" placeholder="Название специальности" style="flex:1;">
        <button title="Добавить ещё одну" style="background:#222;color:#ffaa00;">+</button>
        <button title="Удалить" style="background:#222;color:#ff6666;">×</button>
    `;

    // Кнопка "Добавить ещё"
    line.querySelector('button').addEventListener('click', () => addSpecLine(skillName));

    // Кнопка "Удалить"
    line.querySelectorAll('button')[1].addEventListener('click', () => {
        line.remove();
        if (container.children.length === 0) {
            container.style.display = 'none';
        }
    });

    container.appendChild(line);
    container.style.display = 'flex';
}

// Загрузка описаний атрибутов + подсказок на точки
async function preloadAllAttributes() {
    const attrs = Object.keys(RULES.attributes || {});
    
    for (let attr of attrs) {
        const data = RULES.attributes[attr];
        if (!data) continue;

        // Подсказка на название атрибута
        document.querySelectorAll(`[data-attr="${attr}"]`).forEach(el => {
            let tooltip = data.description || "Нет описания";
            el.setAttribute('data-tooltip', tooltip);
        });

        // Подсказки на каждую точку (1–5)
        for (let level = 1; level <= 5; level++) {
            if (data[`dot${level}`]) {
                const desc = String(data[`dot${level}`]).trim();
                document.querySelectorAll(`.attr-group .dot-label[data-level="${level}"][data-name="${attr}"]`)
                    .forEach(label => {
                        label.setAttribute('data-tooltip', `${attr} • ${level} точек\n${desc}`);
                    });
            }
        }
    }
}

// Загрузка описаний навыков + подсказок на точки
async function preloadAllSkills() {
    const skills = Object.keys(RULES.skills || {});
    
    for (let skill of skills) {
        const data = RULES.skills[skill];
        if (!data) continue;

        // Подсказка на название навыка
        document.querySelectorAll(`[data-skill="${skill}"]`).forEach(el => {
            let tooltip = data.description || "Нет описания";
            el.setAttribute('data-tooltip', tooltip);
        });

        // Подсказки на каждую точку (1–5)
        for (let level = 1; level <= 5; level++) {
            if (data[`dot${level}`]) {
                const desc = String(data[`dot${level}`]).trim();
                document.querySelectorAll(`.skill-group .dot-label[data-level="${level}"][data-name="${skill}"]`)
                    .forEach(label => {
                        label.setAttribute('data-tooltip', `${skill} • ${level} точек\n${desc}`);
                    });
            }
        }
    }
}

// Настройка всех обработчиков событий
function setupEventListeners() {
    // Изменение пакета навыков
    const packageSelect = document.getElementById('skill-package');
    if (packageSelect) {
        packageSelect.addEventListener('change', (e) => {
            currentPackage = e.target.value;
            updateTrackers();
        });
    }

    // Изменение клана
    const clanSelect = document.getElementById('clan-input');
    if (clanSelect) {
        clanSelect.addEventListener('change', () => {
            loadClanHint();
            updateClanIcon();
        });
    }

    // Изменение стиля охоты
    const predatorSelect = document.getElementById('predator-input');
    if (predatorSelect) {
        predatorSelect.addEventListener('change', () => {
            if (predatorSelect.value === "") {
                openPredatorGallery();
            } else {
                loadPredatorHint();
            }
        });
    }

    // Изменение точек и специализаций
    document.addEventListener('change', (e) => {
        if (e.target.classList.contains('dot-input') || 
            e.target.classList.contains('spec-checkbox')) {
            updateTrackers();
        }
    });

    // Сброс точки при повторном клике (клик по уже выбранной)
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'LABEL' && e.target.classList.contains('dot-label')) {
            const inputId = e.target.getAttribute('for');
            const input = document.getElementById(inputId);
            if (!input) return;

            if (input.checked) {
                e.preventDefault();
                const name = input.name;

                // Сбрасываем все точки этого атрибута/навыка
                document.querySelectorAll(`input[name="${name}"]`).forEach(inp => {
                    inp.checked = false;
                });

                // Ставим 0
                const zeroInput = document.querySelector(`input[name="${name}"][value="0"]`);
                if (zeroInput) zeroInput.checked = true;

                updateTrackers();
            }
        }
    });

    // Клик по S-бейджу (специальности)
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('s-badge')) {
            const skillName = e.target.getAttribute('for').replace('s-', '');
            const container = document.getElementById('specs-' + skillName);
            if (!container) return;

            const isVisible = container.style.display !== 'none';
            container.style.display = isVisible ? 'none' : 'flex';

            if (!isVisible && container.children.length === 0) {
                addSpecLine(skillName);
            }
        }
    });
}

            const link = document.createElement('a');
            link.download = `V5_Sheet_${charName.replace(/[^a-zA-Z0-9а-яА-ЯёЁ_-]/g, '_')}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();

            // Возвращаем кнопку в исходное состояние
            btn.textContent = originalText;
            btn.disabled = false;
        }).catch(err => {
            console.error("Ошибка html2canvas:", err);
            alert("Не удалось создать изображение.");
            btn.textContent = originalText;
            btn.disabled = false;
        });
    }, 100);
});


// ==================== ОБРАБОТЧИКИ ====================
function setupEventListeners() {
    document.getElementById('skill-package').addEventListener('change', (e) => {
        currentPackage = e.target.value;
        updateTrackers();
    });

    document.getElementById('clan-input').addEventListener('change', () => {
        loadClanHint();
        updateClanIcon();
    });

    document.getElementById('predator-input').addEventListener('change', () => {
        loadPredatorHint();
    });

    document.addEventListener('change', (e) => {
        if (e.target.classList.contains('dot-input') || e.target.classList.contains('spec-checkbox')) {
            updateTrackers();
        }
    });


// ==================== ГАЛЕРЕЯ КЛАНОВ (полная версия) ====================
let currentClanData = [];
let currentClanIndex = 0;

function openClanGallery() {
    const modal = document.getElementById('clan-modal');
    const gallery = document.getElementById('clan-gallery');
    if (!modal || !gallery) return;

    gallery.innerHTML = '';

    currentClanData = [
        { name: "Бруха", image: "/static/clan_gallery/brujah_full.png", desc: "Бунтари и идеалисты." },
        { name: "Вентру", image: "/static/clan_gallery/ventrue_full.png", desc: "Аристократы и правители." },
        { name: "Гангрел", image: "/static/clan_gallery/gangrel_full.png", desc: "Дикие дети природы." },
        { name: "Малкавиан", image: "/static/clan_gallery/malkavian_full.png", desc: "Безумные пророки." },
        { name: "Носферату", image: "/static/clan_gallery/nosferatu_full.png", desc: "Отверженные хранители тайн." },
        { name: "Тореадор", image: "/static/clan_gallery/toreador_full.png", desc: "Художники и ценители красоты." },
        { name: "Тремер", image: "/static/clan_gallery/tremere_full.png", desc: "Маги и учёные крови." },
        { name: "Каитиф", image: "/static/clan_gallery/caitiff_full.png", desc: "Независимые и скрытные." },
        { name: "Слабокровные", image: "/static/clan_gallery/thinblood_full.png", desc: "Самые молодые и слабые вампиры." }
    ];

    currentClanData.forEach(c => {
        const div = document.createElement('div');
        div.style.cursor = 'pointer';
        div.innerHTML = `
            <img src="${c.image}" style="width:100%; max-height:60vh; object-fit:contain; border-radius:8px; border:2px solid #550000;">
            <h3 style="color:#ff3131; margin:12px 0 6px; text-align:center;">${c.name}</h3>
            <p style="color:#ddd; font-size:14px; padding:0 10px;">${c.desc}</p>
        `;
        div.onclick = () => showSingleClan(c);
        gallery.appendChild(div);
    });

    modal.style.display = 'block';
}

function prevClan() {
    currentClanIndex = (currentClanIndex - 1 + currentClanData.length) % currentClanData.length;
    showSingleClan(currentClanData[currentClanIndex]);
}

function nextClan() {
    currentClanIndex = (currentClanIndex + 1) % currentClanData.length;
    showSingleClan(currentClanData[currentClanIndex]);
}

async function showSingleClan(clan) {
    const gallery = document.getElementById('clan-gallery');
    const data = RULES.clans?.[clan.name] || {};

    gallery.innerHTML = `
        <div style="text-align:center; padding:20px;">
            <button onclick="prevClan()" style="position:absolute;left:20px;top:50%;transform:translateY(-50%);">←</button>
            <button onclick="nextClan()" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);">→</button>
            
            <img src="${clan.image}" style="max-width:90%; max-height:70vh; border:4px solid #ff3131; border-radius:12px;">
            
            <h2 style="color:#ff3131;margin:20px 0;">${clan.name}</h2>
            <div style="background:#1a1a1a;padding:20px;border-radius:8px;text-align:left;">
                ${data.description || clan.desc || 'Описание отсутствует'}
            </div>
            
            <button onclick="selectThisClan('${clan.name}')" style="margin-top:20px;background:#ff3131;color:black;padding:12px 30px;border:none;border-radius:4px;cursor:pointer;">
                Выбрать этот клан
            </button>
            <button onclick="openClanGallery()" style="margin-left:10px;background:transparent;color:#ff3131;border:2px solid #ff3131;padding:12px 30px;border-radius:4px;cursor:pointer;">
                Назад
            </button>
        </div>
    `;
}

function selectThisClan(name) {
    document.getElementById('clan-input').value = name;
    closeClanModal();
    loadClanHint();
    updateClanIcon();
}

function closeClanModal() {
    document.getElementById('clan-modal').style.display = 'none';
}

// ==================== ОБРАБОТЧИК ВЫБОРА КЛАНА ====================
document.getElementById('clan-input').addEventListener('change', function() {
    if (this.value === "") {
        openClanGallery();        // ← Галерея при пустом выборе
    } else {
        loadClanHint();
        updateClanIcon();
    }
});


// ==================== ОБРАБОТЧИК ВЫБОРА СТИЛЯ ОХОТЫ ====================
const predatorSelect = document.getElementById('predator-input');
if (predatorSelect) {
    predatorSelect.addEventListener('change', function() {
        if (this.value === "") {
            openPredatorGallery();   // Открываем галерею при пустом выборе
        } else {
            loadPredatorHint();
        }
    });
}



}
